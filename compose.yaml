services:
  redis:
    image: redis:8.4-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
  mongo:
    image: mongo:7.0-jammy
    restart: unless-stopped
    ports:
      - '27017:27017'
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all']
    healthcheck:
      test: ['CMD', 'mongosh --eval "db.adminCommand(''ping'')" || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    entrypoint:
      - bash
      - -c
      - |
        mongod --replSet rs0 --bind_ip_all &
        until mongosh --eval "db.adminCommand('ping')" >/dev/null 2>&1; do sleep 2; done
        mongosh --eval "rs.initiate({_id: 'rs0', members: [{_id: 0, host: '127.0.0.1:27017'}]})" || true
        wait
